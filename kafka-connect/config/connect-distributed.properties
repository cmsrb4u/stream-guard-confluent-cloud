# Kafka Connect Configuration for Confluent Cloud
bootstrap.servers=pkc-619z3.us-east1.gcp.confluent.cloud:9092
group.id=connect-cluster

# Security for Confluent Cloud
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="5JR4MWVSUDAMUUDD" password="cfltJECbrAWagtOZ0EMFWE/i0w9q5OyEW822CBdMnCxj7oKMyT+werUWXagehDTQ";

# Producer config
producer.security.protocol=SASL_SSL
producer.sasl.mechanism=PLAIN
producer.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="5JR4MWVSUDAMUUDD" password="cfltJECbrAWagtOZ0EMFWE/i0w9q5OyEW822CBdMnCxj7oKMyT+werUWXagehDTQ";

# Consumer config
consumer.security.protocol=SASL_SSL
consumer.sasl.mechanism=PLAIN
consumer.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="5JR4MWVSUDAMUUDD" password="cfltJECbrAWagtOZ0EMFWE/i0w9q5OyEW822CBdMnCxj7oKMyT+werUWXagehDTQ";

# Connect internal topics
config.storage.topic=connect-configs
config.storage.replication.factor=3
offset.storage.topic=connect-offsets
offset.storage.replication.factor=3
status.storage.topic=connect-status
status.storage.replication.factor=3

# Converters
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# REST API
rest.port=8083
rest.advertised.host.name=localhost

# Plugin path
plugin.path=/workshop/kafka-connect/plugins
